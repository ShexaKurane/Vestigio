<body >
  <main>
    <div class="container py-4 lang-div">
      <header class="pb-3 mb-4 border-bottom">
        <a href="/" class="d-flex align-items-center text-body-emphasis text-decoration-none">
          <span class="header-icon"><img style ="max-width: 64px;" src="/img/icons/mundial-2026.png" alt=""></span>
          <span class="access-txt" id="header">2026 FIFA WORLD CUP</span>
        </a>
      </header>
      <div class="form-signin w-100 m-auto shadow" style="background-color: #b0b0b069;">
          <div class="container py-4">
            <form class="form" action="/index.html" method="GET">
              <input type="text" name="language" value="spanish" hidden>
              <button class="btn w-100 py-2 text-white" type="submit" style="background-color: #232323;">
                Español &#127474;&#127485;
              </button>
            </form>
            <form class="form" action="/index.html" method="GET">
              <h1 class="h3 mb-3 fw-normal"></h1>
              <input type="text" name="language" value="english" hidden>
              <button class="btn w-100 py-2 text-white" type="submit" style="background-color: #232323;">
                English &#127482;&#127480;
              </button>
            </form>
            
            <script>
              const currentParams = new URLSearchParams(window.location.search);
              let id = currentParams.get('id');
              if (id === null){
                id = '1';
              }
              document.querySelectorAll('.form').forEach(form => {
                form.addEventListener('submit', function (event) {
                  event.preventDefault();
                  const language = form.querySelector('[name="language"]').value;
                  const newUrl = form.action + '?' + 'id=' + id + '&' + 'language=' + language;
                  window.location.href = newUrl;
                });
              });
            </script>
          </div>
      
        </div>
      <footer class="pt-3 mt-4 text-body-secondary border-top">
        <span>Casa de Cultura de Pachuca &copy; 2026</span>
        <span>Dekairy Software &copy; 2026 </span>
      </footer>
    </div>
