<body >
  <main>
    <div class="container py-4 lang-div">
      <header class="pb-3 mb-4 border-bottom">
        <a href="/" class="d-flex align-items-center text-body-emphasis text-decoration-none">
          <span class="header-icon"><i class="fa-solid fa-building-columns" style="color: rgb(255, 255, 255);"></i></span>
          <span class="fs-4">Museo Vestigio - Audioguía</span>
        </a>
      </header>
      <div class="form-signin w-100 m-auto">
          <div class="container py-4">
            <form class="form" action="../index/index.html" method="GET">
              <input type="text" name="language" value="spanish" hidden>
              <button class="btn btn-primary w-100 py-2" type="submit">
                Español &#127474;&#127485;
              </button>
            </form>
            <form class="form" action="../index/index.html" method="GET">
              <h1 class="h3 mb-3 fw-normal"></h1>
              <input type="text" name="language" value="english" hidden>
              <button class="btn btn-primary w-100 py-2" type="submit">
                English &#127482;&#127480;
              </button>
            </form>
            
            <script>
              const currentParams = new URLSearchParams(window.location.search);
              const id = currentParams.get('id');
              document.querySelectorAll('.form').forEach(form => {
                form.addEventListener('submit', function (event) {
                  event.preventDefault();
                  const language = form.querySelector('[name="language"]').value;
                  const newUrl = form.action + '?' + 'id=' + id + '&' + 'language=' + language;
                  window.location.href = newUrl;
                });
              });
            </script>
          </div>
