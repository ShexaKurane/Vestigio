<!doctype html>
<html lang="en" data-bs-theme="auto">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Secretaría de cultura - Audioguía</title>
  <script src="../assets/js/color-modes.js"></script>
  <link href="../assets/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="../assets/css/style.css" rel="stylesheet" />
  <meta name="theme-color" content="#712cf9" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>
  <main>
    <div class="container py-4">
      <header class="pb-3 mb-4 border-bottom">
        <a href="/" class="d-flex align-items-center text-body-emphasis text-decoration-none" >
          <span class="header-icon access-txt"><i class="fa-solid fa-building-columns" style="color: rgb(255, 255, 255);"></i></span>
          <span class="fs-4 access-txt">Museo Vestigio - Audioguía</span>
        </a>
      </header>
      <div style="background-color:#800040;" class="shadow p-2 mb-4 rounded-3 text-white">
        <div class="container-fluid py-5">
          <h1 id="title" class="display-5 fw-bold mb-0 access-txt">
            -
          </h1>
          <p id="author" class="col-md-8 fs-4 access-txt">
            -
          </p>
          <div id="audio-player" class="audio-player ">
              <img src="../img/icons/speaker.svg" alt="Speaker icon">
            <audio id="audio" controls></audio>
          </div>
          <p id="content" class="p-1 access-txt">
          -  
          </p>
        </div>
        <div class="rounded-3 illust-container">
          <img id="image"
            src=""
            alt="image">
        </div>
      </div>
      <footer class="pt-3 mt-4 text-body-secondary border-top">
        <span class="access-txt">Vestigio - Dekairy Software &copy; 2026 </span>
      </footer>
    </div>
  </main>
  <section id="accesibilidad">
    <div id="acces-menu" class="acces-menu">
      <div id="visual" class="acces-btn" onclick="accesBtnVisualActionState()">
        <i class="fa-solid fa-eye-low-vision" style="color: rgb(255, 255, 255);"></i> <span>Texto grande</span>
      </div>
      <div id="dislexia" class="acces-btn" onclick="accesBtnDislexiaActionState()">
        <i class="fa-solid fa-font" style="color: rgb(255, 255, 255);"></i> <span>Texto para dislexicos</span>
      </div>
    </div>
    <div class="acces-btn" onclick="accesBtnActionState()">
      <i class="fa-solid fa-wheelchair" style="color: rgb(255, 255, 255);"></i>
    </div>
  </section>
  <script src="../assets/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../assets/js/index.js"></script>
  <script src="../assets/js/accesibilidad.js"></script>
</body>

</html>
